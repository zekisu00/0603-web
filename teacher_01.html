<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            width: 600px;
            height: 600px;
            background-color: lightblue;
            margin: auto;
            border-radius: 30px;
        }

        .container-input {
            width: 600px;
            height: 300px;
            background-color: lightyellow;
            margin: auto;
            margin-top: 20px;

            display: flex;
            justify-content: space-around;
            align-items: center;

            border-radius: 30px;
        }

        .item {
            width: 150px;
            height: 150px;
        }

        .item1 {
            background-color: lightblue;
        }

        .item2 {
            background-color: lightgreen;
        }

        .item3 {
            background-color: lightpink;
        }

        .bg-red {
            background-color: lightpink;
        }

        .bg-blue {
            background-color: lightblue;
        }

        .bg-green {
            background-color: lightgreen;
        }
    </style>
</head>

<body>
    <div class="box">

    </div>

    <div class="container-input">
        <div class="item item1" id="blueBtn"></div>
        <div class="item item2" id="greenBtn"></div>
        <div class="item item3" id="redBtn" data-color="bg-red"></div>
    </div>0

    <script>
        // 1.bind
        // 綁定 box
        let box = document.querySelector('.box');

        // 綁定 redBtn
        let redBtn = document.querySelector('#redBtn');

        // 綁定 blueBtn
        // 綁定 greenBtn
        console.log('box', box);
        console.log('redBtn', redBtn);


        // 2.action
        // 紅色按鈕 點一下
        redBtn.addEventListener('click', function () {
            console.log('redBtn ok');

            // box 變紅色
            let getColor = redBtn.getAttribute('data-color');
            console.log('getColor', getColor);

            // $text = "box $getColor"
            let tmpText = `box ${getColor}`;
            console.log('tmpText', tmpText);

            box.setAttribute('class', tmpText);

            // box.setAttribute('class', 'box bg-red');

        });




    </script>

</body>

</html>
